<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F52FF"/>
      <stop offset="100%" stop-color="#C811E2"/>
    </linearGradient>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A3FE8"/>
      <stop offset="100%" stop-color="#A00DB8"/>
    </linearGradient>
  </defs>

  <!-- White circle background for header contrast -->
  <circle cx="100" cy="100" r="98" fill="white"/>

  <!-- K Pac-Man body -->
  <path d="M100,100 L174,55 A88,88 0 1,0 174,145 Z" fill="url(#grad)"/>

  <!-- Eye: Kotlin K mark -->
  <circle cx="68" cy="72" r="18" fill="white"/>
  <path d="M57,60 L79,60 L68,72 L79,84 L57,84 Z" fill="url(#grad-dark)"/>

  <!-- "p" as vector path -->
  <circle cx="141" cy="100" r="8" fill="none" stroke="rgba(127,82,255,0.5)" stroke-width="2.5"/>
  <line x1="133" y1="92" x2="133" y2="114" stroke="rgba(127,82,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Mouth highlights -->
  <line x1="100" y1="100" x2="172" y2="57" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="172" y2="143" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- .with { } .with { } .then { } as vector shapes -->

  <!-- .with { } — top -->
  <circle cx="180" cy="80" r="1.5" fill="#C811E2" opacity="0.8"/>
  <rect x="184" y="76" width="28" height="8" rx="2" fill="#C811E2" opacity="0.15"/>
  <rect x="186" y="78" width="8" height="4" rx="1" fill="#C811E2" opacity="0.5"/>
  <rect x="197" y="78" width="4" height="4" rx="1" fill="#C811E2" opacity="0.35"/>
  <rect x="204" y="78" width="4" height="4" rx="1" fill="#C811E2" opacity="0.35"/>

  <!-- .with { } — middle -->
  <circle cx="180" cy="100" r="1.5" fill="#C811E2" opacity="0.55"/>
  <rect x="184" y="96" width="28" height="8" rx="2" fill="#C811E2" opacity="0.1"/>
  <rect x="186" y="98" width="8" height="4" rx="1" fill="#C811E2" opacity="0.35"/>
  <rect x="197" y="98" width="4" height="4" rx="1" fill="#C811E2" opacity="0.25"/>
  <rect x="204" y="98" width="4" height="4" rx="1" fill="#C811E2" opacity="0.25"/>

  <!-- .then { } — bottom -->
  <circle cx="180" cy="120" r="1.5" fill="#C811E2" opacity="0.35"/>
  <rect x="184" y="116" width="28" height="8" rx="2" fill="#C811E2" opacity="0.07"/>
  <rect x="186" y="118" width="8" height="4" rx="1" fill="#C811E2" opacity="0.22"/>
  <rect x="197" y="118" width="4" height="4" rx="1" fill="#C811E2" opacity="0.15"/>
  <rect x="204" y="118" width="4" height="4" rx="1" fill="#C811E2" opacity="0.15"/>
</svg>
