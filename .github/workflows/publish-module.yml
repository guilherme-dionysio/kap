name: Publish Single Module

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish (e.g. kap-ktor, kap-kotest, kap-ksp, kap-ksp-annotations)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish · ${{ inputs.module }}
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6

      - name: Publish ${{ inputs.module }}
        run: ./gradlew :${{ inputs.module }}:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

      - name: Verify on Maven Central
        run: |
          VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MODULE="${{ inputs.module }}"
          BASE="https://repo1.maven.org/maven2/io/github/damian-rafael-lattenero"
          MAX=30
          for i in $(seq 1 $MAX); do
            if curl -sf "$BASE/$MODULE/$VERSION/$MODULE-$VERSION.pom" > /dev/null 2>&1; then
              echo "$MODULE $VERSION available on Maven Central (attempt $i/$MAX)."
              exit 0
            fi
            echo "Attempt $i/$MAX — waiting 60s..."
            sleep 60
          done
          echo "::warning::$MODULE $VERSION not yet visible after 30 minutes. It may still be syncing."
