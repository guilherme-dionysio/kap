name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6

      - name: Generate Dokka API docs
        run: ./gradlew dokkaGenerate

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Preserve benchmark data from gh-pages
        run: |
          git fetch origin gh-pages:gh-pages || true
          mkdir -p /tmp/benchmarks-backup
          git show gh-pages:benchmarks/data.js > /tmp/benchmarks-backup/data.js 2>/dev/null || true
          git show gh-pages:benchmarks/index.html > /tmp/benchmarks-backup/index.html 2>/dev/null || true

      - name: Build & deploy docs
        run: mkdocs gh-deploy --force --clean --verbose

      - name: Restore benchmark data
        run: |
          if [ -f /tmp/benchmarks-backup/data.js ]; then
            git checkout gh-pages
            mkdir -p benchmarks
            cp /tmp/benchmarks-backup/* benchmarks/
            git add benchmarks/
            git commit -m "restore benchmark data after docs deploy" || true
            git push origin gh-pages
          fi
