name: Publish to Maven Central

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:

  # ── Pre-publish validation ───────────────────────────────────────────────
  validate:
    name: Pre-publish · ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - check: Version consistency
            script: |
              VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
              TAG="${GITHUB_REF_NAME}"
              EXPECTED="v${VERSION}"
              echo "build.gradle.kts version: $VERSION"
              echo "Release tag:              $TAG"
              echo "Expected tag:             $EXPECTED"
              if [ "$TAG" != "$EXPECTED" ]; then
                echo "::error::Version mismatch: build.gradle.kts has $VERSION but release tag is $TAG (expected $EXPECTED)"
                exit 1
              fi
              echo "Version matches."
          - check: Not already published
            script: |
              VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
              for MODULE in kap-core kap-resilience kap-arrow kap-ktor kap-kotest kap-ksp kap-ksp-annotations; do
                URL="https://repo1.maven.org/maven2/io/github/damian-rafael-lattenero/$MODULE/$VERSION/$MODULE-$VERSION.pom"
                if curl -sf "$URL" > /dev/null 2>&1; then
                  echo "::error::$MODULE $VERSION already exists on Maven Central. Bump the version before publishing."
                  exit 1
                fi
                echo "$MODULE $VERSION not found on Maven Central (OK)."
              done
    steps:
      - uses: actions/checkout@v6
      - name: ${{ matrix.check }}
        run: ${{ matrix.script }}

  test:
    name: Pre-publish · Tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Run all tests
        run: |
          ./gradlew :kap-core:jvmTest \
                    :kap-resilience:jvmTest \
                    :kap-arrow:test \
                    :kap-kotest:test \
                    :kap-ktor:test \
                    :benchmarks:test
      - name: Verify multiplatform compilation
        run: ./gradlew compileKotlinJs compileKotlinWasmJs compileKotlinLinuxX64
      - name: Verify codegen is up-to-date
        run: |
          ./gradlew :kap-core:generateAll \
                    :kap-resilience:generateResourceZip \
                    :kap-arrow:generateValidatedOverloads
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated code is out of date."
            exit 1
          fi

  # ── Publish (macOS for Apple targets) ────────────────────────────────────
  publish:
    name: Publish
    needs: test
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

  # Post-publish verification removed — Maven Central sync can take up to 2 hours.
  # The publish step itself validates the upload. Use central.sonatype.com to check.
